#
# k9iser manifest for format-registrations
# Format registry — Deno-based tool managing IANA, shared-mime-info, and Wikidata format registrations

[project]
name = "format-registrations"
safety_tier = "hunt"

[[source]]
path = "deno.json"
type = "deno"
output = "generated/k9iser/deno-workspace.k9"

[[source]]
path = "Justfile"
type = "justfile"
output = "generated/k9iser/justfile-recipes.k9"

[[constraint]]
rule = "build.dependencies has no banned_packages"
severity = "error"

[[constraint]]
rule = "deno.imports has no npm: specifiers"
severity = "error"
